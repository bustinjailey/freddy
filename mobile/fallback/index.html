<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Freddy</title>
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				background: #1c1714;
				color: #eee;
				font-family: system-ui, -apple-system, sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
				text-align: center;
			}
			.box {
				padding: 24px;
			}
			.mark {
				font-size: 4rem;
			}
			.msg {
				margin-top: 12px;
				color: #b9ada4;
				max-width: 24rem;
			}
			button {
				margin-top: 20px;
				padding: 12px 22px;
				font-size: 1.05rem;
				font-weight: 700;
				border: 0;
				border-radius: 12px;
				background: #3a3029;
				color: #fff;
			}
		</style>
	</head>
	<body>
		<!--
			Shown only when the native shell can't reach the Freddy server at launch (it's
			LAN/Tailscale-only). The real UI is the SvelteKit app at server.url in capacitor.config.ts.
		-->
		<div class="box">
			<div class="mark">👶</div>
			<div class="msg">
				Can't reach Freddy. Make sure you're on the home network or Tailscale, then retry.
			</div>
			<button onclick="location.reload()">Retry</button>
		</div>
	</body>
</html>
